<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        /* ตั้งค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* กล่องคอนเทนเนอร์หลัก */
        .container {
            width: 100%;
            max-width: 1000px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-wrap: wrap; /* ให้ตกบรรทัดเมื่อจอเล็ก */
        }

        /* ส่วนซ้าย: ข้อมูลติดต่อ */
        .contact-info {
            background: #2d3436;
            color: #fff;
            flex: 1;
            padding: 40px;
            min-width: 300px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .contact-info h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .info-item i {
            font-size: 24px;
            margin-right: 15px;
            color: #74b9ff;
            margin-top: 5px;
        }

        .info-item p {
            font-size: 16px;
            line-height: 1.6;
            color: #dfe6e9;
        }

        .social-media {
            margin-top: 30px;
        }

        .social-media a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-right: 10px;
            border-radius: 50%;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-media a:hover {
            background: #74b9ff;
            transform: translateY(-3px);
        }

        /* ส่วนขวา: ฟอร์มติดต่อ */
        .contact-form {
            flex: 1.5;
            padding: 40px;
            background: #fff;
            min-width: 300px;
        }

        .contact-form h2 {
            color: #2d3436;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .contact-form p.desc {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3436;
            font-weight: 400;
            font-size: 14px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            outline: none;
            background: #f9f9f9;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #74b9ff;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(116, 185, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical; /* ให้ยืดหดได้แค่แนวตั้ง */
            min-height: 120px;
        }

        button.btn-send {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
            font-weight: 500;
            width: 100%; /* เต็มความกว้างในมือถือ */
        }

        button.btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
        }

        /* Responsive Design: จัดการหน้าจอขนาดเล็ก */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start; /* ให้เลื่อนขึ้นด้านบนในมือถือ */
            }

            .container {
                flex-direction: column; /* เรียงซ้อนกันแนวตั้ง */
                margin-top: 20px;
                margin-bottom: 20px;
            }

            .contact-info {
                padding: 30px;
                order: 2; /* ย้ายข้อมูลติดต่อลงมาด้านล่าง (ถ้าต้องการ) */
            }

            .contact-form {
                padding: 30px;
                order: 1;
            }
            
            .info-item {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="contact-info">
            <div>
                <h2>ข้อมูลติดต่อ</h2>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>123 อาคารเทคโนโลยี ชั้น 5<br>เขตจตุจักร กรุงเทพมหานคร 10900</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <p>adminexample.com</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <p>02-123-4567</p>
                </div>
            </div>
            
            <div class="social-media">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-line"></i></a>
            </div>
        </div>

        <div class="contact-form">
            <h2>ส่งข้อความถึงผู้ดูแลระบบ</h2>
            <p class="desc">กรอกข้อมูลด้านล่างเพื่อสอบถามหรือแจ้งปัญหาการใช้งาน</p>
            
            <form action="#">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" placeholder="ระบุชื่อของคุณ" required>
                </div>
                
                <div class="form-group">
                    <label>อีเมลติดต่อกลับ</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label>หัวข้อเรื่อง</label>
                    <input type="text" placeholder="เช่น แจ้งปัญหาการเข้าสู่ระบบ" required>
                </div>

                <div class="form-group">
                    <label>รายละเอียด</label>
                    <textarea placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                </div>

                <button type="submit" class="btn-send">ส่งข้อความ <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

</body>
</html>
