<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Review</title>
    <style>
        /* --- Global Reset & Fonts --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
            color: #000;
        }

        /* --- Layout Container --- */
        .page-wrapper {
            width: 85%;
            max-width: 1096px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* --- Header Section --- */
        header {
            width: 100%;
            height: auto;
            min-height: 4rem;
            display: flex;
            align-items: center;
        }

        nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

               .back-btn {
            padding: 0.5rem 1.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 5px;
            background-color: black;
            color: white;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .back-btn:hover {
            background-color: #333;
        }

        /* --- Main Content --- */
        main {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            border-top: 2px solid black;
            padding-top: 20px;
        }

        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* --- Typography & Text --- */
        h1.title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .course-code {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .course-name {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .rating-label {
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* --- Radio Button Styling (สำคัญตรงนี้) --- */
        .rating-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* ซ่อนปุ่ม Radio วงกลมดั้งเดิม */
        .rating-group input[type="radio"] {
            display: none;
        }

        /* ปรับแต่ง Label ให้หน้าตาเหมือนปุ่ม */
        .rating-group label {
            flex: 1;
            min-width: 60px;
            max-width: 100px;
            padding: 10px 0;
            background-color: white;
            border: 1px solid #000;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            user-select: none; /* ป้องกันการคลุมดำตัวหนังสือเวลาคลิกรัวๆ */
        }

        .rating-group label:hover {
            background-color: #f0f0f0;
        }

        /* เมื่อ Radio ถูกเลือก (:checked) ให้เปลี่ยนสี Label ที่อยู่ติดกัน (+) */
        .rating-group input[type="radio"]:checked + label {
            background-color: #000;
            color: white;
            border-color: #000;
        }

        /* --- Review Textarea --- */
        .review-box {
            width: 100%;
            height: 150px;
            background-color: #EEEEEE;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
            margin-bottom: 20px;
            color: #555;
        }

        /* --- Footer Action Bar --- */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #000;
        }

        .post-btn {
            background-color: #F25C5C;
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .post-btn:hover {
            background-color: #d64545;
        }

        @media (max-width: 600px) {
            .rating-group {
                gap: 8px;
            }
            .rating-group label {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header>
            <nav>
                <button class="back-btn" onclick="history.back()">กลับ</button>
            </nav>
        </header>

        <main>
            <div class="content">
                <h1 class="title">แชร์ประสบการณ์ของคุณ</h1>
                
                <div id="course-info-container" *ngFor="let subject of subjectData">
                    <div class="course-code" >{{ subject.subcode }}</div>
                    <div class="course-name" >{{ subject.name }}</div>
                </div>

                <p class="rating-label">เลือกจำนวนดาวเพื่อบอกความพอใจของคุณ</p>
                
                <div class="rating-group">
                    <input type="radio" name="rating" id="rate-1" value="1" [(ngModel)]="rate">
                    <label for="rate-1">1★</label>

                    <input type="radio" name="rating" id="rate-2" value="2" [(ngModel)]="rate">
                    <label for="rate-2">2★</label>

                    <input type="radio" name="rating" id="rate-3" value="3" [(ngModel)]="rate">
                    <label for="rate-3">3★</label>

                    <input type="radio" name="rating" id="rate-4" value="4" [(ngModel)]="rate">
                    <label for="rate-4">4★</label>

                    <input type="radio" name="rating" id="rate-5" value="5" [(ngModel)]="rate">
                    <label for="rate-5">5★</label>
                </div>

                <textarea class="review-box" placeholder="พิมพ์ข้อความรีวิวที่นี่ (จำกัด 45 ตัวอักษร)" [(ngModel)]="reviewText"></textarea>

                <div class="action-bar">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" [(ngModel)]="isAnonymous"  value=1>
                        <span>รีวิวแบบไม่ระบุตัวตน</span>
                    </label>
                    <button class="post-btn" (click)="cretaeReview()">โพสต์</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. Mock Data จำลอง API
        const mockApiData = {
            data: {
                subject_id: "0041001",
                subject_name_th: "ภาษาอังกฤษเพื่อเตรียมความพร้อม"
            }
        };

        // 2. ดึงข้อมูลมาแสดงเมื่อโหลดหน้าเว็บ
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const subject = mockApiData.data;
                document.getElementById('courseCode').textContent = subject.subject_id;
                document.getElementById('courseName').textContent = subject.subject_name_th;
            }, 300);
        });

        // 3. ฟังก์ชันจำลองการกดโพสต์ (ดึงค่าจาก Radio ที่เลือก)
        function submitReview() {
            // หา radio ที่ถูก check อยู่
            const selectedRating = document.querySelector('input[name="rating"]:checked');
            
            if (selectedRating) {
                alert('คุณให้คะแนน: ' + selectedRating.value + ' ดาว');
            } else {
                alert('กรุณาเลือกจำนวนดาวก่อนโพสต์');
            }
        }
    </script>
</body>

</html>
