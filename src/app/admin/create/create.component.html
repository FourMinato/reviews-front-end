<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Prompt:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <title>Create New Subject</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            /* แก้ไข 1: เปลี่ยนจาก width 85% เป็น 100% แต่ใช้ padding ช่วยดันเข้าแทน */
            width: 100%;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
            /* ใส่สีพื้นหลังให้เห็น Card ชัดขึ้น */
        }

        /* Container สำหรับคุมความกว้างเนื้อหาไม่ให้เกิน 1096px เหมือนเดิม */
        .page-wrapper {
            width: 85%;
            max-width: 1096px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        header {
            width: 100%;
            height: 4rem;
            /* เพิ่มความสูงนิดหน่อยให้หายใจสะดวก */
            display: flex;
            align-items: center;
        }

        nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background-color: black;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            /* เพิ่ม flex-shrink: 0 เพื่อป้องกันปุ่มบี้เมื่อจอเล็กมากๆ */
            flex-shrink: 0;
        }

        main {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: flex-start;
            /* เปลี่ยนเป็น start เพื่อให้ card ไม่ลอยกลางจอเกินไปในมือถือ */
            justify-content: center;
            padding-top: 20px;
            /* เอา border-top ออกเพื่อให้ดูคลีนขึ้น หรือใส่ไว้ที่ header แทน */
            border-top: 2px solid black;
        }

        .card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid #eee;
        }

        .create-title {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            color: #333;
            margin-bottom: 1rem;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
            color: #444;
            margin-left: 5px;
        }

        input,
        select {
            width: 100%;
            height: 50px;
            padding: 0 1rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            background-color: #fff;
        }

        .create-btn {
            width: 100%;
            background-color: black;
            color: white;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* --- ส่วนสำคัญที่สุด: การจัดการหน้าจอมือถือ --- */
        @media (max-width: 600px) {

            /* ให้ Wrapper เต็มจอ 100% แต่มี padding ซ้ายขวา */
            .page-wrapper {
                width: 100%;
                padding: 0 20px;
            }

            /* ปรับ Card ให้ดูเต็มตาขึ้นในมือถือ */
            .card {
                padding: 2rem 1.5rem;
                box-shadow: none;
                /* ลดเงาในมือถือเพื่อ performance และความคลีน */
                border: none;
                /* เอาขอบออกให้กลืนไปกับพื้นหลังถ้าต้องการ */
                background: transparent;
                /* หรือให้พื้นหลังใสเพื่อให้ดูโล่ง */
            }

            /* ถ้าอยากให้ Card ยังเป็นกล่องขาวในมือถือ ให้ลบ 2 บรรทัดบนออก */

            .logo {
                /* เดิมคุณ display: none ไว้ ผมแนะนำให้เปิดไว้แต่ลดขนาดลง หรือซ่อนถ้าต้องการพื้นที่ */
                display: block;
                font-size: 1rem;
            }

            .create-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header>
            <nav>
                <button class="back-btn" (click)="back()">กลับ</button>
                <div class="logo">
                    <span>Create Subject</span>
                </div>
            </nav>
        </header>

        <main>
            <div class="card">
                <div class="create-title">เพิ่มรายวิชา</div>

                <div class="input-group">
                    <label>หมวดหมู่รายวิชา</label>
                    <select [(ngModel)]="cateID">
                        <option value="0" disabled selected  >กรุณาเลือกหมวดหมู่</option>
                        <option *ngFor="let cate of categories" [value]="cate">{{ cate }}</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>รหัสวิชา</label>
                    <input type="text" placeholder="เช่น 0041001" [(ngModel)]="subcode" >
                </div>

                <div class="input-group">
                    <label>ชื่อรายวิชา</label>
                    <input type="text" placeholder="ระบุชื่อวิชา" [(ngModel)]="name" >
                </div>

                <button class="create-btn" (click)="create()">เพิ่มรายวิชา</button>
            </div>
        </main>
    </div>
</body>

</html>
