<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="page-wrapper">
        <header class="header">
                <button class="back-btn" (click)="back()">กลับ</button>
                <h1 class="title">User Management</h1>
            </header>

        <section class="stats-container">
            <div class="stat-card">
                <span class="stat-title">ผู้ใช้งานทั้งหมด</span>
                <span class="stat-value">1,240</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">แอดมิน (Admin)</span>
                <span class="stat-value">5</span>
            </div>
        </section>

        <hr class="divider">

        <div class="tools-bar">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="ค้นหาชื่อ หรือ อีเมล...">
            </div>
            
            <div class="filter-group">
                <select class="role-select">
                    <option value="all">ทุกสิทธิ์การใช้งาน</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                </select>
            </div>
        </div>

        <main class="user-list">
            <div class="list-header">
                <div class="col-name">ชื่อผู้ใช้งาน</div>
                <div class="col-role">สิทธิ์การใช้งาน</div>
                <div class="col-action">จัดการ</div>
            </div>

            <div class="user-card" *ngFor="let user of users">
               <div class="user-info">
    <div class="avatar-circle">
        <img [src]="user.image" alt="{{ user.name }}">
    </div>
    
    <div class="text-group">
        <div class="user-name">{{ user.name }}</div>
        <div class="user-email">{{ user.email }}</div>
    </div>
</div>

                <div class="user-role">
                    <span class="badge" [ngClass]="user.role === 'Admin' ? 'badge-admin' : 'badge-user'">
                        {{ user.role }}
                    </span>
                </div>

                <div class="user-actions">
                    <button class="action-btn edit" title="แก้ไข" (click)="userDetail()">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="action-btn delete" title="ลบ">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
