<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details Edit Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ... (CSS เดิมของคุณทั้งหมด ใส่ไว้ตรงนี้) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { width: 100%; min-height: 100vh; background-color: #f8f9fa; display: flex; justify-content: center; }
        .container { width: 85%; max-width: 1096px; }
        .header { display: flex; justify-content: space-between; align-items: center; height: 4rem; }
        .back-btn { background-color: black; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: transform 0.2s; }
        .back-btn:hover { transform: translateX(-5px); }
        .title { font-size: 24px; font-weight: bold; }
        .divider { border: 0; border-top: 2px solid #000; margin-bottom: 40px; }
        .profile-wrapper { display: flex; justify-content: center; }
        
        .profile-card {
            width: 100%; max-width: 600px; background: white; border-radius: 20px;
            padding: 50px 40px; display: flex; flex-direction: column; align-items: center;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e0e0e0;
            position: relative;
        }

        .profile-image-container { width: 150px; height: 150px; margin-bottom: 25px; position: relative; }
        .profile-image { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .status-badge { position: absolute; bottom: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; }
        .status-active { background-color: #28a745; }
        .status-inactive { background-color: #dc3545; }

        .user-name { font-size: clamp(24px, 4vw, 32px); font-weight: 600; margin-bottom: 5px; color: #222; }
        .user-role { background-color: #f0f0f0; color: #555; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 500; margin-bottom: 15px; display: inline-block; }
        .user-email { font-size: 18px; color: #666; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        
        .action-buttons { display: flex; gap: 15px; width: 100%; margin-top: 20px; } /* เพิ่ม margin-top นิดหน่อย */
        .btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 16px; cursor: pointer; border: none; font-weight: 500; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-edit { background-color: black; color: white; }
        .btn-edit:hover { background-color: #333; }
        
        /* --- CSS ที่เพิ่มใหม่สำหรับโหมดแก้ไข --- */
        .edit-input {
            width: 100%;
            padding: 10px 15px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center; /* ให้ Input จัดกลางเหมือน Text เดิม */
            outline: none;
            background-color: #fafafa;
        }
        .edit-input:focus { border-color: black; background-color: white; }

        .btn-save { background-color: black; color: white; } /* ปุ่มบันทึกสีเขียว */
        .btn-save:hover { background-color: black; }
        
        .btn-cancel { background-color: #fff; color: #666; border: 1px solid #ddd; } /* ปุ่มยกเลิกสีเทา */
        .btn-cancel:hover { background-color: #f0f0f0; }

        /* ไอคอนกล้องถ่ายรูปตอนแก้ไขรูป */
        .img-edit-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; cursor: pointer;
            opacity: 0; transition: opacity 0.2s;
        }
        .profile-image-container:hover .img-edit-overlay { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <button class="back-btn" (click)="back()">กลับ</button>
            <span class="title">User Profile</span>
            <div style="width: 70px;"></div> 
        </header>

        <hr class="divider">

        <div class="profile-wrapper">
            <div class="profile-card">
                
                <div class="profile-image-container">
                    <img [src]="user.image" alt="Profile" class="profile-image">
                    
                    <div class="img-edit-overlay" *ngIf="isEditing">
                        <i class="fas fa-camera"></i>
                    </div>

                  
                </div>

                <ng-container *ngIf="!isEditing">
                    <div class="user-role">{{ user.role }}</div>
                    <h2 class="user-name">{{ user.name }}</h2>
                    <div class="user-email">
                        <i class="fas fa-envelope"></i> {{ user.email }}
                    </div>
                </ng-container>

                <ng-container *ngIf="isEditing">
                    <select [(ngModel)]="tempUser.role" class="edit-input" style="width: auto; padding: 5px 20px;">
                        <option value="Admin">Admin</option>
                        <option value="User">User</option>
                    </select>

                    <input type="text" [(ngModel)]="tempUser.name" class="edit-input" placeholder="ชื่อ-นามสกุล">
                    
                    <input type="email" [(ngModel)]="tempUser.email" class="edit-input" placeholder="อีเมล">
                </ng-container>


                <div class="action-buttons">
                    <button class="btn btn-edit" *ngIf="!isEditing" (click)="toggleEdit()">
                        <i class="fas fa-pen"></i> แก้ไขข้อมูล
                    </button>

                    <button class="btn btn-cancel" *ngIf="isEditing" (click)="cancelEdit()">
                        ยกเลิก
                    </button>
                    <button class="btn btn-save" *ngIf="isEditing" (click)="saveEdit()">
                        <i class="fas fa-save"></i> บันทึก
                    </button>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
