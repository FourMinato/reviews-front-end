<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            
            background-color: white; /* ปรับพื้นหลังให้ออกเทานิดๆ เพื่อให้ Card สีขาวเด่นขึ้น */
        }

        .dashboard-header {
            border-bottom: 2px solid #ddd;
            margin-bottom: 2rem !important;
        }

        /* ปรับแต่ง Card ใหม่ */
        .card-custom {
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            background-color: #ffffff; /* สีขาว */
            color: #444; /* สีตัวอักษรเทาเข้ม */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }

        /* Hover: มีเงาและยกตัวขึ้น */
        .card-custom:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            border-color: #ccc;
            background-color: #fafafa; /* เทาอ่อนๆ ตอน hover */
        }

        /* คลาสที่จะใส่เมื่อถูกคลิก (Active State) */
        .card-custom.active-black {
            background-color: #000000 !important;
            color: #ffffff !important;
            border-color: #000000;
            transform: scale(0.98); /* ยุบตัวลงเล็กน้อยตอนคลิก */
        }

        /* ปรับสี Icon ใน Card ปกติ */
        .icon-box {
            font-size: 2.8rem;
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }
        
        /* สีก่อนคลิกของแต่ละไอคอน (Optional: ให้ดูมีสีสันนิดนึงก่อนดำ) */
        /* .text-primary-alt { color: #4e73df; }
        .text-success-alt { color: #1cc88a; }
        .text-danger-alt { color: #e74a3b; }
        .text-info-alt { color: #36b9cc; }
        .text-warning-alt { color: #f6c23e; } */

        .text-primary-alt { color: black; }
        .text-success-alt { color: black; }
        .text-danger-alt { color: black; }
        .text-info-alt { color: black; }
        .text-warning-alt { color: black; }

        /* เมื่อ Card เป็น Active ให้ Icon เป็นสีขาวด้วย */
        .active-black .icon-box, 
        .active-black .card-title, 
        .active-black .card-text {
            color: #ffffff !important;
        }

        .card-text {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <main class="col-md-12 px-md-5 py-2">
            <div class="d-flex justify-content-end align-items-center pt-3 pb-2 mb-3 dashboard-header">
                <h1 class="h2 fw-bold">Admin Dashboard</h1>
            </div>

            <div class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4">
                
                <div class="col">
                    <div class="card h-100 card-custom p-3" (click)="createNew()">
                        <div class="card-body text-center">
                            <div class="icon-box text-primary-alt"><i class="fas fa-plus-circle"></i></div>
                            <h5 class="card-title fw-600">Create New Subject</h5>
                            <p class="card-text">เพิ่มข้อมูลรายวิชา</p>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 card-custom p-3" (click)="detailSubjects()">
                        <div class="card-body text-center">
                            <div class="icon-box text-success-alt"><i class="fas fa-edit"></i></div>
                            <h5 class="card-title fw-600">Edit Subjects</h5>
                            <p class="card-text">แก้ไขข้อมูลรายวิชา</p>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 card-custom p-3" >
                        <div class="card-body text-center">
                            <div class="icon-box text-danger-alt"><i class="fas fa-trash-alt"></i></div>
                            <h5 class="card-title fw-600">Delete / Close</h5>
                            <p class="card-text">ลบหรือปิดการมองเห็น</p>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 card-custom p-3" >
                        <div class="card-body text-center">
                            <div class="icon-box text-info-alt"><i class="fas fa-info-circle"></i></div>
                            <h5 class="card-title fw-600">Subjec Details</h5>
                            <p class="card-text">ดูวิชาทั้งหมด</p>
                        </div>
                    </div>
                </div>
                 <div class="col">
                    <div class="card h-100 card-custom p-3" (click)="reportsPage()">
                        <div class="card-body text-center">
                            <div class="icon-box text-info-alt"><i class="fas fa-file"></i></div>
                            <h5 class="card-title fw-600">All Reports</h5>
                            <p class="card-text">ดูรายงานทั้งหมด</p>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 card-custom p-3" (click)="userPage()">
                        <div class="card-body text-center">
                            <div class="icon-box text-warning-alt"><i class="fas fa-users"></i></div>
                            <h5 class="card-title fw-600">All Users</h5>
                            <p class="card-text">จัดการสมาชิกและสิทธิ์</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
